            要求：

            - 一切基于事实，不能编造。不知道就回答不知道。

            - 不能照搬别人的原话，用自己的语言重新描述（引用除外）。

            - 引用要遵循 APA 格式。

            - 写作风格介于书面学术和口语之间。

            - 所有句子都要有主语。

            - 不要用复杂长难句，尽量用短句。

            - 替换掉非日常词汇。

            - 把过度词和连接词换成最基础的常用词。'
