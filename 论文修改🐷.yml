    - data:
        code: "def main(knowledge_result: list, internet_result: list) -> dict:\n\
          \    \"\"\"\n    合并本地知识库和网络搜索结果为文本\n    \"\"\"\n    \n    # 处理知识检索结果（本地知识库）\n\
          \    kb_texts = []\n    if knowledge_result and len(knowledge_result) >\
          \ 0:\n        for idx, item in enumerate(knowledge_result, 1):\n       \
          \     content = item.get(\"content\") or item.get(\"text\") or item.get(\"\
          page_content\") or \"\"\n            if content:\n                kb_texts.append(f\"\
          [本地知识 {idx}] {content}\")\n    \n    # 处理网络搜索结果（Tavily）\n    web_texts =\
          \ []\n    if internet_result and len(internet_result) > 0:\n        for\
          \ idx, item in enumerate(internet_result, 1):\n            content = item.get(\"\
          content\") or item.get(\"snippet\") or item.get(\"answer\") or str(item)\n\
          \            url = item.get(\"url\") or item.get(\"link\") or \"\"\n   \
          \         if content:\n                source = f\" ({url})\" if url else\
          \ \"\"\n                web_texts.append(f\"[网络资料 {idx}] {content}{source}\"\
          )\n    \n    # 合并\n    sections = []\n    if kb_texts:\n        sections.append(\"\
          === 本地知识库资料 ===\\n\" + \"\\n\\n\".join(kb_texts))\n    if web_texts:\n \
          \       sections.append(\"=== 网络搜索资料 ===\\n\" + \"\\n\\n\".join(web_texts))\n\
          \    \n    final_text = \"\\n\\n\".join(sections) if sections else \"未检索到相关资料。\"\
          \n    \n    return {\"result\": final_text}"
        code_language: python3
        outputs:
          result:
            children: null
            type: string
        selected: false
